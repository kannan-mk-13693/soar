<?xml version="1.0" encoding="UTF-8"?>
      <svg viewBox="0 0 1100 1480" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:auto; display:block; font-family:'Segoe UI', -apple-system, sans-serif;">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#3a3a3a"/>
          </marker>
          <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a7a7a"/>
          </marker>
          <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#a83a3a"/>
          </marker>
          <filter id="ds" x="-10%" y="-10%" width="120%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/>
            <feOffset dx="0.5" dy="1.5" result="off"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <style>
          .oval { fill:#fbc7c7; stroke:#a35a5a; stroke-width:1.8; }
          .rect { fill:#fce4a3; stroke:#a87b22; stroke-width:1.8; }
          .dec  { fill:#fce4a3; stroke:#a87b22; stroke-width:1.8; }
          .data { fill:#b7d6ef; stroke:#4a78a5; stroke-width:1.8; }
          .fail { fill:#f5c0c0; stroke:#a83a3a; stroke-width:1.8; }
          .lbl  { font-size:13px; font-weight:600; fill:#1a2330; text-anchor:middle; }
          .lbl-s { font-size:10.5px; font-style:italic; fill:#555; text-anchor:middle; }
          .branch-yes { font-size:11.5px; font-weight:700; fill:#1a8a4a; }
          .branch-no  { font-size:11.5px; font-weight:700; fill:#c83030; }
          .phase     { font-size:13px; font-weight:700; letter-spacing:1.5px; }
          .arr       { stroke:#3a3a3a; stroke-width:1.8; fill:none; }
          .arr-d     { stroke:#7a7a7a; stroke-width:1.6; fill:none; stroke-dasharray:5,3; }
          .arr-r     { stroke:#a83a3a; stroke-width:1.8; fill:none; stroke-dasharray:6,3; }
        </style>

        <!-- ================= PHASE 1 BACKGROUND ================= -->
        <rect x="20" y="20" width="1060" height="420" rx="14" fill="#eaf3fc" stroke="#cbd9ea"/>
        <text x="40" y="50" class="phase" fill="#1a4a7c">PHASE 1 — ADSF CALLER  ·  PlaybookAction.addExecutionAudit()</text>

        <!-- Start oval -->
        <g filter="url(#ds)">
          <ellipse cx="550" cy="100" rx="180" ry="26" class="oval"/>
        </g>
        <text x="550" y="105" class="lbl">Block finishes (success/fail) — addExecutionAudit() invoked</text>
        <path d="M 550 126 L 550 154" class="arr" marker-end="url(#arr)"/>

        <!-- Rect: build JSONObject -->
        <g filter="url(#ds)">
          <rect x="320" y="154" width="460" height="60" rx="3" class="rect"/>
        </g>
        <text x="550" y="178" class="lbl">Build auditLog (JSONObject)</text>
        <text x="550" y="198" class="lbl-s">EXECUTION_ID · MODIFIED_TIME · BLOCK_ID · BLOCK_NAME · STATUS · STATUS_MSG · I/O</text>
        <path d="M 550 214 L 550 240" class="arr" marker-end="url(#arr)"/>

        <!-- Decision: blockSpecificInputs != null? -->
        <g filter="url(#ds)">
          <polygon points="550,240 740,320 550,400 360,320" class="dec"/>
        </g>
        <text x="550" y="312" class="lbl">blockSpecificInputs != null ?</text>
        <text x="550" y="330" class="lbl-s">(ADMP-specific extra props)</text>

        <!-- YES branch right -->
        <path d="M 740 320 L 840 320 L 840 360" class="arr" marker-end="url(#arr)"/>
        <text x="780" y="312" class="branch-yes">YES</text>
        <g filter="url(#ds)">
          <rect x="720" y="360" width="240" height="60" rx="3" class="rect"/>
        </g>
        <text x="840" y="385" class="lbl">put(PROP_NAME, lastKey)</text>
        <text x="840" y="403" class="lbl">put(PROP_VALUE, lastValue)</text>

        <!-- NO branch left -->
        <path d="M 360 320 L 260 320 L 260 360" class="arr" marker-end="url(#arr)"/>
        <text x="290" y="312" class="branch-no">NO</text>
        <g filter="url(#ds)">
          <rect x="160" y="360" width="200" height="48" rx="3" class="rect"/>
        </g>
        <text x="260" y="389" class="lbl">(skip extra props)</text>

        <!-- Converge → call facade -->
        <path d="M 260 408 L 260 460 L 540 460" class="arr"/>
        <path d="M 840 420 L 840 460 L 560 460" class="arr"/>

        <!-- ================= PHASE 2 BACKGROUND ================= -->
        <rect x="20" y="470" width="1060" height="350" rx="14" fill="#f1ebfa" stroke="#d9c8eb"/>
        <text x="40" y="500" class="phase" fill="#5a3a8c">PHASE 2 — SPI FACADE  ·  PlaybookFacade (singleton)</text>

        <!-- Rect: call facade -->
        <g filter="url(#ds)">
          <rect x="330" y="530" width="440" height="50" rx="3" class="rect"/>
        </g>
        <text x="550" y="560" class="lbl">PlaybookFacade.getInstance().addPlaybookBlockAudit(auditLog)</text>
        <path d="M 550 580 L 550 606" class="arr" marker-end="url(#arr)"/>

        <!-- Rect: delegate lookup (note) -->
        <g filter="url(#ds)">
          <rect x="280" y="606" width="540" height="60" rx="3" class="data"/>
        </g>
        <text x="550" y="630" class="lbl">delegate.addPlaybookBlockAudit(auditLog)</text>
        <text x="550" y="650" class="lbl-s">delegate bootstrapped via static block from IM_WF_INTERFACE product param</text>
        <path d="M 550 666 L 550 690" class="arr" marker-end="url(#arr)"/>

        <!-- Decision: exception in facade? -->
        <g filter="url(#ds)">
          <polygon points="550,690 720,755 550,820 380,755" class="dec"/>
        </g>
        <text x="550" y="752" class="lbl">Exception thrown ?</text>
        <text x="550" y="770" class="lbl-s">(facade-level try/catch)</text>

        <!-- YES right: log and swallow -->
        <path d="M 720 755 L 870 755" class="arr-r" marker-end="url(#arr-red)"/>
        <text x="795" y="748" class="branch-yes" fill="#c83030">YES</text>
        <g filter="url(#ds)">
          <rect x="870" y="730" width="200" height="50" rx="3" class="fail"/>
        </g>
        <text x="970" y="752" class="lbl">LOGGER.log(INFO, ex)</text>
        <text x="970" y="770" class="lbl-s">never rethrown</text>

        <!-- NO down: continue to ELA impl -->
        <text x="585" y="838" class="branch-yes">NO</text>
        <path d="M 550 820 L 550 855" class="arr" marker-end="url(#arr)"/>

        <!-- ================= PHASE 3 BACKGROUND ================= -->
        <rect x="20" y="855" width="1060" height="600" rx="14" fill="#e7f6ec" stroke="#c4e3cf"/>
        <text x="40" y="885" class="phase" fill="#1f6a3d">PHASE 3 — ELA IMPL  ·  ELAIncidentWFHandler.addPlaybookBlockAudit()</text>

        <!-- Rect: try-block start (compute index name) -->
        <g filter="url(#ds)">
          <rect x="280" y="910" width="540" height="76" rx="3" class="rect"/>
        </g>
        <text x="550" y="935" class="lbl">indexName = LogIndexer.getIndexName(</text>
        <text x="550" y="955" class="lbl">  PLAYBOOKAUDITINDEX, "playbookaudit_", MODIFIED_TIME)</text>
        <text x="550" y="976" class="lbl-s">builds daily-bucketed ES index name, e.g. playbookaudit_2026-05-21</text>
        <path d="M 550 986 L 550 1014" class="arr" marker-end="url(#arr)"/>

        <!-- Rect: stamp index name into auditLog -->
        <g filter="url(#ds)">
          <rect x="280" y="1014" width="540" height="56" rx="3" class="rect"/>
        </g>
        <text x="550" y="1038" class="lbl">auditLog.put(LOG_RECEIVER_KEY_INDEX_NAME, indexName)</text>
        <text x="550" y="1058" class="lbl-s">tells the log receiver pipeline which ES index to target</text>
        <path d="M 550 1070 L 550 1098" class="arr" marker-end="url(#arr)"/>

        <!-- Parallelogram: indexRecord -->
        <g filter="url(#ds)">
          <polygon points="340,1098 760,1098 740,1158 320,1158" class="data"/>
        </g>
        <text x="540" y="1126" class="lbl">LogIndexingAPI.getInstance().indexRecord(auditLog)</text>
        <text x="540" y="1146" class="lbl-s">async write to Elasticsearch (PLAYBOOKAUDITINDEX family)</text>
        <path d="M 540 1158 L 540 1192" class="arr" marker-end="url(#arr)"/>

        <!-- Decision: indexer exception? -->
        <g filter="url(#ds)">
          <polygon points="540,1192 720,1262 540,1332 360,1262" class="dec"/>
        </g>
        <text x="540" y="1258" class="lbl">Exception during indexing ?</text>
        <text x="540" y="1276" class="lbl-s">(impl-level try/catch)</text>

        <!-- YES right: log and swallow -->
        <path d="M 720 1262 L 870 1262" class="arr-r" marker-end="url(#arr-red)"/>
        <text x="795" y="1255" class="branch-yes" fill="#c83030">YES</text>
        <g filter="url(#ds)">
          <rect x="870" y="1236" width="200" height="50" rx="3" class="fail"/>
        </g>
        <text x="970" y="1258" class="lbl">LOGGER.log(INFO, e)</text>
        <text x="970" y="1276" class="lbl-s">"Exception while indexing audit data"</text>

        <!-- NO down: done -->
        <text x="575" y="1350" class="branch-yes">NO</text>
        <path d="M 540 1332 L 540 1370" class="arr" marker-end="url(#arr)"/>

        <!-- End oval -->
        <g filter="url(#ds)">
          <ellipse cx="540" cy="1395" rx="200" ry="26" class="oval"/>
        </g>
        <text x="540" y="1400" class="lbl">Audit record written · void return to caller</text>

      </svg>
